# Local development: publish ports on the host.
# Usage: docker compose -f docker-compose.yml -f docker-compose.local.yml up -d --build

services:
  mailpit:
    ports:
      - "8025:8025"

  frontend:
    ports:
      - "8100:80"

  backend:
    ports:
      - "8000:8000"

  postgres:
    ports:
      - "5432:5432"
