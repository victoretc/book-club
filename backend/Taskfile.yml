version: '3'

vars:
  SIMULTANEOUS_TEST_JOBS: 4
  JSON_SCHEMA_URL: "http://127.0.0.1:8000/api/v1/docs/schema/?format=json"

tasks:
  default:
    cmds:
      - task: help

  install-dev-deps:
    cmds:
      - uv sync --locked

  install-deps:
    cmds:
      - uv sync --locked --no-dev

  fmt:
    cmds:
      - uv run ruff check src --fix --unsafe-fixes
      - uv run ruff format src
      - uv run toml-sort pyproject.toml

  lint:
    cmds:
      - uv run python src/manage.py check
      - uv run python src/manage.py makemigrations --check --dry-run --no-input
      - uv run ruff check src
      - uv run ruff format --check src
      - uv run mypy src
      - uv run toml-sort --check pyproject.toml
      - uv run pymarkdown scan README.md
      - uv run dotenv-linter src/env/.env

  test:
    cmds:
      - uv run pytest src/clubs --dead-fixtures
      - uv run pytest src/clubs --create-db --reuse-db --exitfirst -n {{.SIMULTANEOUS_TEST_JOBS}} --alluredir=allure-results

  csu:
    cmds:
      - uv run python src/manage.py csu

  migrate:
    cmds:
      - uv run python src/manage.py migrate

  run:
    cmds:
      - uv run python src/manage.py runserver

  migrations:
    cmds:
      - uv run python src/manage.py makemigrations

  generate-client:
    dir: src
    cmds:
      - uv run restcodegen generate -u {{.JSON_SCHEMA_URL}} -s "book_club" -a false

  loaddata: 
    dir: src 
    cmds:
      - uv run python manage.py loaddata users.json clubs.json

  all:
    cmds:
      - docker compose up -d postgres
      - task: migrations
      - task: migrate
      - task: csu
      - task: run 

  help:
    cmds:
      - |
        echo "Taskfile for book_club"
        echo ""
        echo "Usage:"
        echo "  task install-dev-deps   Install development dependencies"
        echo "  task install-deps       Install production dependencies"
        echo "  task fmt                Format code"
        echo "  task lint               Lint code"
        echo "  task test               Run tests"
        echo "  task help               Show this help message"
        echo "  task csu                Create superuser"
        echo "  task migrate            Migrate db"
        echo "  task migrations         Make db migrations"
        echo "  task run                Run Backend"